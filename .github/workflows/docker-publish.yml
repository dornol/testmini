name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # --- Validate tag format and version consistency ---
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate semver tag format
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid tag format: ${TAG}. Expected: v<major>.<minor>.<patch> (e.g., v1.2.3)"
            exit 1
          fi

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version (${TAG_VERSION}) does not match package.json version (${PKG_VERSION})"
            exit 1
          fi

  # --- Verify before building ---
  verify:
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm check

      - name: Unit tests
        run: pnpm test

      - name: Migration integrity
        run: pnpm db:check

  # --- Build and push Docker image ---
  build-and-push:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate release notes
        id: notes
        run: |
          # Find previous semver tag (skip pre-releases and current tag)
          CURRENT="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname \
            | grep -vE '[-+]' \
            | grep -v "^${CURRENT}$" \
            | head -n 1)
          VERSION=${CURRENT#v}

          {
            echo "notes<<RELEASE_EOF"
            echo "## Docker"
            echo ""
            echo "\`\`\`bash"
            echo "docker pull ghcr.io/${{ github.repository }}:${VERSION}"
            echo "\`\`\`"
            echo ""
            echo "## Changes"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              git log "${PREV_TAG}..${CURRENT}" --pretty=format:"- %s (%h)" --no-merges
            else
              echo "Initial release"
            fi
            echo ""
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          generate_release_notes: false
