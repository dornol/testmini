services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: "postgres://testmini:${POSTGRES_PASSWORD}@db:5432/testmini"
      ORIGIN: "${ORIGIN}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET}"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-changeme}@redis:6379"
      NODE_ENV: production
      # S3/MinIO (optional — omit to use local filesystem)
      S3_BUCKET: "${S3_BUCKET:-}"
      S3_ENDPOINT: "${S3_ENDPOINT:-}"
      S3_REGION: "${S3_REGION:-us-east-1}"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
    volumes:
      - uploads:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - frontend
      - backend

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: testmini
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: testmini
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testmini"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:-changeme}"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  backup:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: testmini
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: testmini
      # Cron schedule for pg_dump (default: daily at 02:00)
      BACKUP_SCHEDULE: "${BACKUP_SCHEDULE:-0 2 * * *}"
      # Number of backup files to retain
      BACKUP_RETAIN: "${BACKUP_RETAIN:-30}"
    volumes:
      - backups:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    entrypoint: >
      sh -c '
        set -e
        echo "[backup] Installing crond..."
        apk add --no-cache dcron

        mkdir -p /backups

        cat > /usr/local/bin/run-backup.sh << '"'"'SCRIPT'"'"'
      #!/usr/bin/env sh
      set -e
      TIMESTAMP=$(date +%Y-%m-%d_%H%M%S)
      BACKUP_FILE="/backups/backup_${TIMESTAMP}.sql.gz"
      RETAIN="${BACKUP_RETAIN:-30}"
      echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Starting backup -> ${BACKUP_FILE}"
      PGPASSWORD="${POSTGRES_PASSWORD}" pg_dump \
        -h db \
        -U "${POSTGRES_USER}" \
        "${POSTGRES_DB}" \
        | gzip > "${BACKUP_FILE}"
      if [ ! -s "${BACKUP_FILE}" ]; then
        echo "[$(date +%Y-%m-%d\ %H:%M:%S)] ERROR: Backup file is empty." >&2
        rm -f "${BACKUP_FILE}"
        exit 1
      fi
      SIZE=$(du -sh "${BACKUP_FILE}" | cut -f1)
      echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Backup complete: ${BACKUP_FILE} (${SIZE})"
      echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Applying retention (keep last ${RETAIN})..."
      ls -1t /backups/backup_*.sql.gz 2>/dev/null \
        | tail -n "+$((RETAIN + 1))" \
        | xargs -r rm -f
      echo "[$(date +%Y-%m-%d\ %H:%M:%S)] Done."
      SCRIPT

        chmod +x /usr/local/bin/run-backup.sh

        echo "${BACKUP_SCHEDULE} /usr/local/bin/run-backup.sh >> /proc/1/fd/1 2>&1" \
          > /etc/crontabs/root

        echo "[backup] Cron schedule: ${BACKUP_SCHEDULE}"
        echo "[backup] Retention    : ${BACKUP_RETAIN:-30} backups"
        echo "[backup] Running initial backup on startup..."
        /usr/local/bin/run-backup.sh || echo "[backup] Initial backup failed (non-fatal)."

        echo "[backup] Starting crond..."
        exec crond -f -l 8
      '

volumes:
  pgdata:
  redisdata:
  uploads:
  backups:

networks:
  frontend:
  backend:
